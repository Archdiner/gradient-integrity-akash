---
# Phase 2B: Baseline ASR confirmation -- backdoor / FedAvg / 3 simulated clients.
# Companion to results/expected/akash_backdoor_FedAvg_3c.json.
#
# Phase 2B prerequisites: MET (as of current codebase).
#   - Text backdoor trigger (" cf" → " the") injected on Byzantine client batches.
#   - Per-round ASR logged in results["rounds"][*]["asr"].
#   - compare results to results/expected/akash_backdoor_FedAvg_3c.json.

version: "2.0"

services:
  trainer:
    image: asadrizvi06/gradient-integrity:phase2-v5
    expose:
      - port: 8080
        as: 80
        proto: tcp
        to:
          - global: true
    env:
      - WANDB_API_KEY
      - WANDB_PROJECT=gradient-integrity-phase2
      - WANDB_RUN_GROUP=phase2B_baseline_backdoor
      - WANDB_MODE=online
      - HF_HUB_OFFLINE=0
      - PYTHONUNBUFFERED=1
    args:
      - "--model"
      - "small"
      - "--rounds"
      - "200"
      - "--batch"
      - "8"
      - "--lr"
      - "0.0006"
      - "--honest"
      - "2"
      - "--byz"
      - "1"
      - "--attack"
      - "backdoor"
      - "--defense"
      - "FedAvg"
      - "--device"
      - "cuda"
      - "--output"
      - "/app/results/run.json"
    params:
      storage:
        results:
          mount: /app/results
          readOnly: false

profiles:
  compute:
    trainer:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 20Gi
          - name: results
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        trainer:
          denom: uact
          amount: 10000

deployment:
  trainer:
    akash:
      profile: trainer
      count: 1
