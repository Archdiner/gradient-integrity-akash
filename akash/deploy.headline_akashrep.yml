---
# Phase 2C: HEADLINE EXPERIMENT -- backdoor / AkashRep+FedAvg / 3 simulated clients.
# Companion to results/expected/reputation/akash_backdoor_AkashRep+FedAvg_3c.json.
#
# Phase 2C prerequisites: MET (as of current codebase).
#   - src/defenses/reputation.py: ReputationWeightedAggregator implemented.
#   - --defense AkashRep+FedAvg accepted; AKASH_REP_WEIGHTS env var parsed.
#   - ASR logging wired (same as Phase 2B).
#
# The deployment passes the realistic-regime weights via env so the inner SDL
# does not contain any operational secret beyond the W&B key.
# Realistic regime: w_honest=0.85, w_byzantine=0.30. These are the headline
# numbers from agent_docs/expected_akash_reputation_results.md.

version: "2.0"

services:
  trainer:
    image: asadrizvi06/gradient-integrity:phase2-v5
    expose:
      - port: 8080
        as: 80
        proto: tcp
        to:
          - global: true
    env:
      - WANDB_API_KEY
      - WANDB_PROJECT=gradient-integrity-phase2
      - WANDB_RUN_GROUP=phase2C_headline_akashrep
      - WANDB_MODE=online
      - HF_HUB_OFFLINE=0
      - PYTHONUNBUFFERED=1
      - AKASH_REP_REGIME=realistic
      - AKASH_REP_WEIGHTS=0.85,0.85,0.30
    args:
      - "--model"
      - "small"
      - "--rounds"
      - "200"
      - "--batch"
      - "8"
      - "--lr"
      - "0.0006"
      - "--honest"
      - "2"
      - "--byz"
      - "1"
      - "--attack"
      - "backdoor"
      - "--defense"
      - "AkashRep+FedAvg"
      - "--device"
      - "cuda"
      - "--output"
      - "/app/results/run.json"
    params:
      storage:
        results:
          mount: /app/results
          readOnly: false

profiles:
  compute:
    trainer:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 20Gi
          - name: results
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        trainer:
          denom: uact
          amount: 10000

deployment:
  trainer:
    akash:
      profile: trainer
      count: 1
