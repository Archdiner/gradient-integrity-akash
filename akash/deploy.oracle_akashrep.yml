---
# Phase 2C-Oracle: BEST-CASE BOUND -- backdoor / AkashRep+FedAvg / 3 simulated clients.
# Companion to results/expected/reputation/akash_backdoor_AkashRep+FedAvg_3c.json
# (oracle regime band).
#
# Oracle regime: w_honest=1.00, w_byzantine=0.00.  Models a "perfect" Akash
# reputation oracle that knows exactly which provider is Byzantine and zeroes
# its contribution.  This is the upper-bound on what reputation weighting can
# achieve and the strongest possible counter-claim for the paper.
#
# Together with deploy.headline_akashrep.yml (realistic) and
# deploy.degraded_akashrep.yml (degraded) this gives the three-point ASR
# attenuation curve the paper hypothesises.

version: "2.0"

services:
  trainer:
    image: asadrizvi06/gradient-integrity:phase2-v5
    expose:
      - port: 8080
        as: 80
        proto: tcp
        to:
          - global: true
    env:
      - WANDB_API_KEY
      - WANDB_PROJECT=gradient-integrity-phase2
      - WANDB_RUN_GROUP=phase2C_oracle_akashrep
      - WANDB_MODE=online
      - HF_HUB_OFFLINE=0
      - PYTHONUNBUFFERED=1
      - AKASH_REP_REGIME=oracle
      - AKASH_REP_WEIGHTS=1.0,1.0,0.0
    args:
      - "--model"
      - "small"
      - "--rounds"
      - "200"
      - "--batch"
      - "8"
      - "--lr"
      - "0.0006"
      - "--honest"
      - "2"
      - "--byz"
      - "1"
      - "--attack"
      - "backdoor"
      - "--defense"
      - "AkashRep+FedAvg"
      - "--device"
      - "cuda"
      - "--output"
      - "/app/results/run.json"
    params:
      storage:
        results:
          mount: /app/results
          readOnly: false

profiles:
  compute:
    trainer:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 20Gi
          - name: results
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        trainer:
          denom: uact
          amount: 10000

deployment:
  trainer:
    akash:
      profile: trainer
      count: 1
