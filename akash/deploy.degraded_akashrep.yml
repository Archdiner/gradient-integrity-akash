---
# Phase 2C-Degraded: WORST-CASE BOUND -- backdoor / AkashRep+FedAvg / 3 simulated clients.
# Companion to results/expected/reputation/akash_backdoor_AkashRep+FedAvg_3c.json
# (degraded regime band).
#
# Degraded regime: w_honest=0.70, w_byzantine=0.60.  Models a noisy / poorly
# calibrated Akash reputation signal where honest and Byzantine providers look
# almost the same.  Expected to behave close to a no-defense FedAvg run.  This
# is the lower-bound on the value of reputation weighting and shows the failure
# mode that motivates a *combined* AkashRep + classical-defense stack.

version: "2.0"

services:
  trainer:
    image: asadrizvi06/gradient-integrity:phase2-v5
    expose:
      - port: 8080
        as: 80
        proto: tcp
        to:
          - global: true
    env:
      - WANDB_API_KEY
      - WANDB_PROJECT=gradient-integrity-phase2
      - WANDB_RUN_GROUP=phase2C_degraded_akashrep
      - WANDB_MODE=online
      - HF_HUB_OFFLINE=0
      - PYTHONUNBUFFERED=1
      - AKASH_REP_REGIME=degraded
      - AKASH_REP_WEIGHTS=0.70,0.70,0.60
    args:
      - "--model"
      - "small"
      - "--rounds"
      - "200"
      - "--batch"
      - "8"
      - "--lr"
      - "0.0006"
      - "--honest"
      - "2"
      - "--byz"
      - "1"
      - "--attack"
      - "backdoor"
      - "--defense"
      - "AkashRep+FedAvg"
      - "--device"
      - "cuda"
      - "--output"
      - "/app/results/run.json"
    params:
      storage:
        results:
          mount: /app/results
          readOnly: false

profiles:
  compute:
    trainer:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          - size: 20Gi
          - name: results
            size: 100Gi
            attributes:
              persistent: true
              class: beta3
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
  placement:
    akash:
      pricing:
        trainer:
          denom: uact
          amount: 10000

deployment:
  trainer:
    akash:
      profile: trainer
      count: 1
