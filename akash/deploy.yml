version: "2.0"

services:
  trainer:
    image: asadrizvi06/gradient-integrity:latest
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
    env:
      - ROLE=worker
      - NODE_ID=0
      - TOTAL_NODES=3
      - WANDB_API_KEY=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
      - WANDB_MODE=online
    args:
      - "--model"
      - "small"
      - "--rounds"
      - "200"
      - "--batch"
      - "8"
      - "--defense"
      - "FedAvg"
      - "--attack"
      - "clean"
      - "--device"
      - "cuda"

profiles:
  compute:
    trainer:
      resources:
        cpu:
          units: 16
        memory:
          size: 64Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100_80gb
        storage:
          size: 100Gi
  placement:
    akash:
      pricing:
        trainer:
          denom: uakt
          amount: 5000

deployment:
  trainer:
    akash:
      profile: trainer
      count: 1